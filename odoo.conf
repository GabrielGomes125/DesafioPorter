[options]
addons_path = /mnt/extra-addons
data_dir = /var/lib/odoo

; A conexão com o banco vem do docker-compose (env HOST/USER/PASSWORD). Não fixe
; db_user/db_password aqui: o entrypoint da imagem oficial dá prioridade ao
; arquivo de config, e mudar as credenciais no .env deixaria de ter efeito.
db_port = 5432

; Senha do gerenciador de bancos (criar/duplicar/apagar bases pela UI).
; Troque em produção. Para o desafio, mantemos previsível.
admin_passwd = admin

; Desenvolvimento: recarrega Python/XML sem reiniciar o container.
dev_mode = reload,qweb,xml

; Logs
log_level = info
