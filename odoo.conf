[options]
addons_path = /mnt/extra-addons
data_dir = /var/lib/odoo

; Conexão com o banco (host/user/password vêm do docker-compose via env,
; mas fixamos aqui para deixar explícito o comportamento dentro do container).
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo

; Senha do gerenciador de bancos (criar/duplicar/apagar bases pela UI).
; Troque em produção. Para o desafio, mantemos previsível.
admin_passwd = admin

; Desenvolvimento: recarrega Python/XML sem reiniciar o container.
dev_mode = reload,qweb,xml

; Logs
log_level = info
